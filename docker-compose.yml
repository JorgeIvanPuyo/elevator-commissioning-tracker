services:
  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: development
      APP_NAME: Megapolis Elevator Traceability
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/elevator_commissioning
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres_test:5432/elevator_commissioning_test
      CORS_ORIGINS: http://localhost:3000
      GCS_BUCKET_NAME: ""
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - postgres_test

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elevator_commissioning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elevator_commissioning_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_app_data:
  postgres_test_data:
